# aaPanel / Nginx — CadeiraLivre
# Site: cadeiralivre.tdesksolutions.com.br
#
# No aaPanel: Website → seu site → Config → cole o bloco "location /" abaixo
# (substitua o location / existente se não tiver try_files para index.php).
#
# IMPORTANTE:
# 1. "Run directory" / pasta de execução do site = /public
# 2. Remova pastas físicas que bloqueiam rotas dinâmicas:
#    rm -rf /www/wwwroot/cadeiralivre.tdesksolutions.com.br/public/agendar
#    rm -rf /www/wwwroot/cadeiralivre.tdesksolutions.com.br/public/cliente

location / {
    try_files $uri $uri/ /index.php?$query_string;
}

location ~ \.php$ {
    include fastcgi.conf;
    include pathinfo.conf;
    fastcgi_pass unix:/tmp/php-cgi-83.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}

location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
    expires 7d;
    access_log off;
}
