services:
  app:
    build: .
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: cadeira_livre_saas
      DB_USERNAME: root
      DB_PASSWORD: root

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cadeira_livre_saas
    ports:
      - "3307:3306"
    volumes:
      - cadeira_mysql:/var/lib/mysql

volumes:
  cadeira_mysql:
