name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cadeira_livre_saas
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, json, fileinfo, openssl

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Environment and migrate
        run: |
          cp .env.example .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=root/' .env
          php scripts/migrate.php
          mysql -h 127.0.0.1 -P 3306 -u root -proot cadeira_livre_saas < database/seeds/001_demo.sql

      - name: PHPUnit
        run: vendor/bin/phpunit
